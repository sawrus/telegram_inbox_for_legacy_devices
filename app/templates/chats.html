{% extends "base.html" %}
{% block title %}Чаты - Telegram Inbox{% endblock %}
{% block content %}
<h2>Выберите чат</h2>
{% if chats %}
<ul class="chat-list">
    {% for chat in chats %}
        <li><a href="{{ url_for('main.chat_messages', chat_id=chat.id) }}">{{ chat.title }}</a></li>
    {% endfor %}
</ul>
{% else %}
<p class="empty">Чаты не найдены.</p>
{% endif %}
{% endblock %}
